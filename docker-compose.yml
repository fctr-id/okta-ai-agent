services:
  okta-ai-agent:
    build:
      context: .
    image: fctrid/ai-agent-for-okta:3.0.1-alpha
    pull_policy: always  # Always pull the latest image
    container_name: okta-ai-agent
    ports:
      - "127.0.0.1:8001:8001"  # Expose HTTPS port locally by default
    volumes:
      # Database directory - contains all SQLite data
      - ./sqlite_db:/app/sqlite_db

      # Multi-turn conversation runtime storage
      - ./chat_sessions:/app/chat_sessions
      
      # SSL certificates for HTTPS
      - ./certs:/app/src/backend/certs
      
      # Application logs
      - ./logs:/app/logs
    env_file:
      - .env  # Use variables from .env file
    environment:
      # Database location inside container
      - DB_DIR=/app/sqlite_db
      - DB_FILENAME=okta_sync.db
      - CHAT_SESSIONS_DIR=/app/chat_sessions
      
      # CORS settings
      - ALLOWED_ORIGINS=https://localhost:*,https://127.0.0.1:*
    restart: unless-stopped  # Automatically restart container if it crashes
    networks:
      - okta-network
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 8G

networks:
  okta-network:
    driver: bridge